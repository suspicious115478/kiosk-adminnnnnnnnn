<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MenuAdmin — Login</title>
  <link rel="stylesheet" href="./css/shared.css" />
  <style>
    body {
      align-items: center;
      justify-content: center;
      display: flex;
      padding: 24px;
    }

    .auth-wrap {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease forwards;
    }

    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--accent), #e05520);
      border-radius: 14px;
      font-size: 1.5rem;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(255,107,53,0.3);
    }

    .brand h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand p {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Tab switcher ── */
    .auth-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      padding: 4px;
      border-radius: 10px;
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
    }

    .auth-tab.active {
      background: var(--accent);
      color: #fff;
    }

    .auth-panel { display: none; }
    .auth-panel.active { display: block; }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 32px;
    }

    .auth-card h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 22px;
      color: var(--text);
    }

    .auth-note {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 16px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="auth-wrap">
  <div class="brand">
    <div class="brand-logo">🍽️</div>
    <h1>MenuAdmin</h1>
    <p>Restaurant Management Panel</p>
  </div>

  <div class="auth-card">
    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-panel="login">Login</button>
      <button class="auth-tab"        data-panel="signup">Create Account</button>
    </div>

    <!-- Login -->
    <div id="panel-login" class="auth-panel active">
      <h2>Welcome back 👋</h2>
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button id="loginBtn" class="btn btn-primary btn-full" style="margin-top:8px;">
        Login →
      </button>
    </div>

    <!-- Signup -->
    <div id="panel-signup" class="auth-panel">
      <h2>New restaurant? Let's go 🚀</h2>
      <div class="field">
        <label>Restaurant Name</label>
        <input type="text" id="signupName" placeholder="e.g. Spice Garden" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Min. 6 characters" />
      </div>
      <button id="signupBtn" class="btn btn-primary btn-full" style="margin-top:8px;">
        Create Account →
      </button>
    </div>

    <p class="auth-note">Secure login powered by Firebase Auth</p>
  </div>
</div>

<div class="toast" id="toast"></div>
<script type="module" src="./js/auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MenuAdmin — New Order</title>
  <link rel="stylesheet" href="./css/web-order.css" />
</head>
<body>

<div class="shell">
  <main class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <a href="./dashboard.html" class="back-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Dashboard
        </a>
        <span class="topbar-page-title">New Order</span>
      </div>
      <div class="topbar-right">
  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="itemSearch" placeholder="Search all items..." />
  </div>
  <div class="order-type-toggle">
    <button class="ot-btn active" data-type="DINE_IN">🍽️ Dine In</button>
    <button class="ot-btn" data-type="TAKEAWAY">🥡 Takeaway</button>
  </div>
  
</div>
    </div>

    <!-- 3-col POS layout -->
    <div class="pos-layout">

      <!-- LEFT: Categories -->
      <div class="col-categories">
        <div class="col-head">
          <span class="col-head-title">Categories</span>
        </div>
        <div id="categoryList" class="category-list">
          <div class="skeleton-list">
            <div class="skeleton-item"></div>
            <div class="skeleton-item"></div>
            <div class="skeleton-item"></div>
            <div class="skeleton-item"></div>
          </div>
        </div>
      </div>

      <!-- MIDDLE: Items -->
      <div class="col-items">
        <div class="col-head">
  <span class="col-head-title" id="activeCatLabel">Select a category</span>
</div>
        <div id="itemGrid" class="item-grid">
          <div class="items-placeholder">
            <span class="ph-icon">👈</span>
            <span class="ph-text">Select a category to see items</span>
          </div>
        </div>
      </div>

      <!-- RIGHT: Summary / Cart -->
      <div class="col-summary">
        <div class="col-head">
          <span class="col-head-title">Order Summary</span>
          <span class="cart-count-badge" id="cartCountBadge" style="display:none;">0</span>
        </div>

        <div id="cartItems" class="cart-items">
          <div class="cart-empty">
            <span class="cart-empty-icon">🛒</span>
            <span>No items added yet</span>
          </div>
        </div>

        <div class="bill-section" id="billSection" style="display:none;">
          <div class="bill-row">
            <span>Subtotal</span>
            <span id="billSubtotal">₹0.00</span>
          </div>
          <div id="billTaxRow" class="bill-row" style="display:none;">
            <span id="billTaxLabel">Tax</span>
            <span id="billTaxAmt">₹0.00</span>
          </div>
          <div id="billServiceRow" class="bill-row" style="display:none;">
            <span id="billServiceLabel">Service Charge</span>
            <span id="billServiceAmt">₹0.00</span>
          </div>
          <div id="billPackingRow" class="bill-row" style="display:none;">
            <span id="billPackingLabel">Packing Charge</span>
            <span id="billPackingAmt">₹0.00</span>
          </div>
          <div id="billOtherRows"></div>
          <div class="bill-row bill-total">
            <span>Total</span>
            <span id="billTotal">₹0.00</span>
          </div>
        </div>

        <div class="payment-toggle-wrap" id="paymentToggleWrap" style="display:none;">
          <div class="order-type-toggle" style="width:100%;justify-content:center;">
            <button class="pm-btn active" data-method="CASH">💵 Cash</button>
            <button class="pm-btn" data-method="UPI">📱 UPI</button>
            <button class="pm-btn" data-method="CARD">💳 Card</button>
          </div>
        </div>
        <div class="cart-footer">
          <button id="placeOrderBtn" class="place-order-btn" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Place Order
          </button>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Success Modal -->
<div class="modal-overlay" id="successModal" style="display:none;">
  <div class="modal-card">
    <div class="modal-check">✅</div>
    <div class="modal-title">Order Placed!</div>
    <div class="modal-sub" id="modalOrderId">Order #——</div>
    <div class="modal-total" id="modalTotal">₹0.00</div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-sec" id="modalViewOrdersBtn">View Orders</button>
      <button class="modal-btn modal-btn-pri" id="modalNewOrderBtn">New Order</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script type="module" src="./js/web-order.js"></script>
</body>
</html>
